name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  discover:
    name: Discover Images
    permissions:
      contents: read
    uses: ./.github/workflows/discover-images.yml
    with:
      is_pull_request: ${{ github.event_name == 'pull_request' }}
      base_sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
      head_sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}

  lint:
    name: Lint (${{ matrix.image }})
    needs: discover
    if: needs.discover.outputs.images != '[]'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.discover.outputs.images) }}
    uses: ./.github/workflows/lint-image.yml
    with:
      image: ${{ matrix.image }}

  build:
    name: Build (${{ matrix.image }})
    needs: [discover, lint]
    if: needs.discover.outputs.images != '[]'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.discover.outputs.images) }}
    uses: ./.github/workflows/build-image.yml
    with:
      image: ${{ matrix.image }}

  scan:
    name: Scan (${{ matrix.image }})
    needs: [discover, build]
    if: needs.discover.outputs.images != '[]'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.discover.outputs.images) }}
    uses: ./.github/workflows/scan-image.yml
    with:
      image: ${{ matrix.image }}

  publish:
    name: Publish (${{ matrix.image }})
    if: needs.discover.outputs.images != '[]' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [discover, build, scan]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.discover.outputs.images) }}
    uses: ./.github/workflows/publish-image.yml
    with:
      image: ${{ matrix.image }}
    secrets: inherit
