name: Scan Image

on:
  workflow_call:
    inputs:
      image:
        description: Image directory being scanned
        required: true
        type: string

jobs:
  scan:
    name: Scan (${{ inputs.image }})
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}

      - name: Prepare image metadata
        id: meta
        run: |
          version=$(grep '^FROM' "${{ inputs.image }}/Dockerfile" | tail -1 | sed 's/.*://')
          echo "image_ref=ghcr.io/trly/${{ inputs.image }}:$version" >> "$GITHUB_OUTPUT"

      - name: Download image artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: docker-image-${{ inputs.image }}
          path: ${{ runner.temp }}/image

      - name: Load image
        run: gunzip -c "${{ runner.temp }}/image/image.tar.gz" | docker load

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.meta.outputs.image_ref }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Write scan marker
        if: success()
        run: printf '%s\n' '${{ inputs.image }}' > '${{ runner.temp }}/image.txt'

      - name: Upload scan passed marker
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: scan-passed-${{ inputs.image }}
          path: ${{ runner.temp }}/image.txt
          retention-days: 1
