name: Setup

on:
  workflow_call:
    inputs:
      base_sha:
        description: Base SHA for diffing changed image directories
        required: false
        type: string
        default: ''
      head_sha:
        description: Head SHA for diffing changed image directories
        required: false
        type: string
        default: ''
    outputs:
      images:
        description: JSON array of changed image directories to process
        value: ${{ jobs.setup.outputs.images }}

jobs:
  setup:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      images: ${{ steps.find.outputs.images }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Find changed images
        id: find
        env:
          BASE_SHA: ${{ inputs.base_sha }}
          HEAD_SHA: ${{ inputs.head_sha }}
        run: |
          images="$(${GITHUB_WORKSPACE}/.github/scripts/discover-images.sh "$BASE_SHA" "$HEAD_SHA")"
          echo "images=$images" >> "$GITHUB_OUTPUT"
