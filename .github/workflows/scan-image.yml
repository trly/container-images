name: Scan Image

on:
  workflow_call:
    inputs:
      image:
        description: Image directory being scanned
        required: true
        type: string

jobs:
  scan:
    name: Scan (${{ inputs.image }})
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.sha }}

      - name: Prepare image metadata
        id: meta
        run: |
          version=$(grep '^FROM' "${{ inputs.image }}/Dockerfile" | tail -1 | sed 's/.*://')
          echo "image_ref=ghcr.io/trly/${{ inputs.image }}:$version" >> "$GITHUB_OUTPUT"

      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docker-image-${{ inputs.image }}
          path: ${{ runner.temp }}/image

      - name: Load image
        run: gunzip -c "${{ runner.temp }}/image/image.tar.gz" | docker load

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.image_ref }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
          trivyignores: ${{ inputs.image }}/.trivyignore

      - name: Write scan marker
        if: success()
        run: printf '%s\n' '${{ inputs.image }}' > '${{ runner.temp }}/image.txt'

      - name: Upload scan passed marker
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scan-passed-${{ inputs.image }}
          path: ${{ runner.temp }}/image.txt
          retention-days: 1
