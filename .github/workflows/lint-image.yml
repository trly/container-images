name: Lint Image

on:
  workflow_call:
    inputs:
      image:
        description: Image directory to lint
        required: true
        type: string

jobs:
  lint:
    name: Lint (${{ inputs.image }})
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.sha }}

      - name: Run Hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ${{ inputs.image }}/Dockerfile

      - name: Write lint marker
        if: success()
        run: printf '%s\n' '${{ inputs.image }}' > '${{ runner.temp }}/image.txt'

      - name: Upload lint passed marker
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lint-passed-${{ inputs.image }}
          path: ${{ runner.temp }}/image.txt
          retention-days: 1
