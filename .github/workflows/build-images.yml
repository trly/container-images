name: Build Images

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  discover:
    name: Discover images
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      images: ${{ steps.find.outputs.images }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Find images
        id: find
        run: |
          all_images() {
            find . -name Dockerfile -not -path './.github/*' -printf '%h\n' |
              sed 's|^\./||' |
              sort -u
          }

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            changed_files=$(git diff --name-only \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}")

            if printf '%s\n' "$changed_files" | grep -Eq '^(\.github/workflows/build-images\.yml|\.github/dependabot\.yml)$'; then
              images=$(all_images | jq -R -s -c 'split("\n") | map(select(. != ""))')
            else
              images=$(printf '%s\n' "$changed_files" |
                cut -d/ -f1 |
                sort -u |
                while read -r dir; do
                  [ -f "$dir/Dockerfile" ] && printf '%s\n' "$dir"
                done |
                jq -R -s -c 'split("\n") | map(select(. != ""))')
            fi
          else
            images=$(all_images | jq -R -s -c 'split("\n") | map(select(. != ""))')
          fi

          echo "images=$images" >> "$GITHUB_OUTPUT"

  build:
    name: Build and Scan (${{ matrix.image }})
    runs-on: ubuntu-24.04
    needs: discover
    if: needs.discover.outputs.images != '[]'
    permissions:
      contents: read
    strategy:
      matrix:
        image: ${{ fromJson(needs.discover.outputs.images) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ${{ matrix.image }}/Dockerfile

      - name: Extract tag from Dockerfile
        id: tag
        run: echo "version=$(grep '^FROM' ${{ matrix.image }}/Dockerfile | tail -1 | sed 's/.*://')" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: docker build -t ghcr.io/trly/${{ matrix.image }}:${{ steps.tag.outputs.version }} ${{ matrix.image }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: 'ghcr.io/trly/${{ matrix.image }}:${{ steps.tag.outputs.version }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
