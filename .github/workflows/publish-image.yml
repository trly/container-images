name: Publish Image

on:
  workflow_call:
    inputs:
      image:
        description: Image directory to publish
        required: true
        type: string

jobs:
  publish:
    name: Publish (${{ inputs.image }})
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.sha }}

      - name: Prepare image metadata
        id: meta
        run: |
          version=$(grep '^FROM' "${{ inputs.image }}/Dockerfile" | tail -1 | sed 's/.*://')
          echo "image_ref=ghcr.io/trly/${{ inputs.image }}:$version" >> "$GITHUB_OUTPUT"

      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docker-image-${{ inputs.image }}
          path: ${{ runner.temp }}/image

      - name: Load image
        run: gunzip -c "${{ runner.temp }}/image/image.tar.gz" | docker load

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: docker push ${{ steps.meta.outputs.image_ref }}
