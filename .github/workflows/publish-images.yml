name: Publish Images

on:
  workflow_run:
    workflows:
      - Build Images
    types:
      - completed

jobs:
  discover:
    name: Discover images
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      images: ${{ steps.find.outputs.images }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Find images
        id: find
        run: |
          images=$(find . -name Dockerfile -not -path './.github/*' -printf '%h\n' |
            sed 's|^\./||' |
            sort -u |
            jq -R -s -c 'split("\n") | map(select(. != ""))')

          echo "images=$images" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish (${{ matrix.image }})
    runs-on: ubuntu-24.04
    needs: discover
    if: needs.discover.outputs.images != '[]'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image: ${{ fromJson(needs.discover.outputs.images) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Extract tag from Dockerfile
        id: tag
        run: echo "version=$(grep '^FROM' ${{ matrix.image }}/Dockerfile | tail -1 | sed 's/.*://')" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: docker build -t ghcr.io/trly/${{ matrix.image }}:${{ steps.tag.outputs.version }} ${{ matrix.image }}

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: docker push ghcr.io/trly/${{ matrix.image }}:${{ steps.tag.outputs.version }}
