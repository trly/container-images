name: Publish Image

on:
  workflow_call:
    inputs:
      image:
        description: Image directory to publish
        required: true
        type: string

jobs:
  publish:
    name: Publish (${{ inputs.image }})
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check scan passed
        id: scan-check
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: scan-passed-${{ inputs.image }}
          path: ${{ runner.temp }}/scan-check
        continue-on-error: true

      - name: Skip if scan failed
        if: steps.scan-check.outcome != 'success'
        run: |
          echo "::warning::Skipping publish for ${{ inputs.image }} — scan did not pass"
          exit 0

      - name: Checkout code
        if: steps.scan-check.outcome == 'success'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}

      - name: Prepare image metadata
        if: steps.scan-check.outcome == 'success'
        id: meta
        run: |
          version=$(grep '^FROM' "${{ inputs.image }}/Dockerfile" | tail -1 | sed 's/.*://')
          echo "image_ref=ghcr.io/trly/${{ inputs.image }}:$version" >> "$GITHUB_OUTPUT"

      - name: Download image artifact
        if: steps.scan-check.outcome == 'success'
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: docker-image-${{ inputs.image }}
          path: ${{ runner.temp }}/image

      - name: Load image
        if: steps.scan-check.outcome == 'success'
        run: gunzip -c "${{ runner.temp }}/image/image.tar.gz" | docker load

      - name: Log in to GHCR
        if: steps.scan-check.outcome == 'success'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: steps.scan-check.outcome == 'success'
        run: docker push ${{ steps.meta.outputs.image_ref }}
